<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./image.png">
    <title>MineClub - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="scroll-disabled">

    <audio id="welcome-sound" src="./krnbeatz-dawn-logo-430179.mp3" preload="auto"></audio>
<center>
    <div id="splash-screen">
        <div class="splash-content">
            <img src="./logo.png" alt="Logo" class="entrance-logo"> 
            <h1 class="splash-text">MINE CLUB</h1>
            
            <div class="loader-container">
                <div class="loader-bar"></div>
            </div>

            <button id="enter-btn">CLICK TO CONTINUE</button>
            <p class="ghost-text">Please Click To Continue...</p>
        </div>
    </div>
</center>
<center>
    <div id="main-site" class="hidden">
        <header class="main-header">
            <div class="logo-area">
                <img src="./logo.png" alt="Logo" class="site-logo"> 
                <span class="logo-text">MineClub</span>
            </div>
            <nav class="nav-links">
                <a href="resoursepacks.html" class="nav-item">Packs</a>
                <a href="under.html" class="nav-item">Under Maintance</a>
                <a href="mods.html" class="nav-item">Mods</a>
                <a href="https://discord.gg/BlanckTm" class="nav-item">Discord</a>
                <div id="nav-auth" class="user-area">
    <a href="login.html" style="color:#52FF52; text-decoration:none; font-weight:bold;">LOGIN</a>
</div>
            </nav>
        </header>
</center>
        <section class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">BEST MINECRAFT ASSETS WEBSITE</h1>
                <p class="hero-subtitle">The ultimate collection for FPS and PvP performance.</p>
                <div class="hero-buttons">
                    <a href="resoursepacks.html" class="mc-button">Get Packs</a>
                    <a href="mods.html" class="mc-button">Get Mods</a>
                </div>
            </div>
        </section>
    </div>

    <script>
        const splash = document.getElementById('splash-screen');
        const mainSite = document.getElementById('main-site');
        const enterBtn = document.getElementById('enter-btn');
        const audio = document.getElementById('welcome-sound');

        enterBtn.addEventListener('click', () => {
            // تشغيل الصوت عند الضغط
            audio.play().catch(e => console.log("Sound error: ", e));
            
            splash.classList.add('fade-out');
            setTimeout(() => {
                splash.style.display = 'none';
                mainSite.classList.remove('hidden');
                mainSite.classList.add('fade-in');
                document.body.classList.remove('scroll-disabled');
                document.body.classList.add('scroll-enabled');
            }, 800);
        });
    </script>
    <script>
    // 1. نجيب بيانات الرجال من ذاكرة المتصفح
    const loggedUser = JSON.parse(localStorage.getItem('minecore_user'));

    // 2. إذا الرجال موجود (يعني مسجل دخول)
    if (loggedUser) {
        const authArea = document.getElementById('nav-auth');
        
        // 3. نمسح LOGIN ونحط الصورة والاسم اللي اختارهم الكود عشوائياً
        authArea.innerHTML = `
            <div style="display:flex; align-items:center; gap:12px; cursor:pointer;">
                <span style="color:#52FF52; font-size:12px; font-weight:bold;">${loggedUser.name}</span>
                <img src="${loggedUser.avatar}" style="width:45px; height:45px; border-radius:50%; border:2px solid #52FF52; object-fit:cover;">
                <button onclick="logoutUser()" style="background:none; border:none; color:#ff4444; font-size:10px; cursor:pointer;">Logout</button>
            </div>
        `;
    }

    // دالة تسجيل الخروج عشان إذا يبي يطلع
    function logoutUser() {
        localStorage.removeItem('minecore_user');
        location.reload(); // تحديث الصفحة عشان ترجع كلمة LOGIN
    }
</script>
</body>
</html>
