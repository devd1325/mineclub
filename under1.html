<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineClub - Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Press+Start+2P&display=swap');

        body { margin: 0; background: #0b0f19; color: white; font-family: 'Roboto', sans-serif; }

        /* ستايل الهيدر اللي في صورتك */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(30, 41, 59, 0.2);
            border: 1px solid rgba(82, 255, 82, 0.2);
            border-radius: 50px; /* الحواف الدائرية للهيدر */
            margin: 20px auto;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        /* حاوية صورة البروفايل (بدل اللوجو القديم) */
        #user-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #user-brand img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #52FF52;
            object-fit: cover;
            display: none; /* مخفية لحد ما يسجل دخول */
        }

        .brand-name {
            font-family: 'Press Start 2P', cursive;
            color: #52FF52;
            font-size: 14px;
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 20px; align-items: center; }
        
        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: #52FF52; }

        /* زر اللوجن أو اسم المستخدم */
        #auth-btn {
            color: #52FF52;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .hero-text {
            text-align: center;
            margin-top: 100px;
            font-family: 'Press Start 2P', cursive;
            font-size: 30px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div id="user-brand">
            <img id="user-avatar" src="" alt="Avatar">
            <a href="index.html" class="brand-name">MINECLUB</a>
        </div>

        <div class="nav-links">
            <a href="#">Packs</a>
            <a href="#">Under Maintenance</a>
            <a href="#">Mods</a>
            <a href="#">Discord</a>
            <div id="auth-container">
                <a href="login.html" id="auth-btn">LOGIN</a>
            </div>
        </div>
    </nav>

    <div class="hero-text">
        BEST MINECRAFT ASSETS WEBSITE
    </div>

    <script>
        // 1. نجيب بيانات الرجال من الـ Local Storage
        const user = JSON.parse(localStorage.getItem('minecore_user'));

        if (user) {
            // 2. إذا مسجل دخول: حط صورته على الشمال بدل اللوجو
            const avatarImg = document.getElementById('user-avatar');
            avatarImg.src = user.avatar;
            avatarImg.style.display = "block";

            // 3. غير كلمة LOGIN لاسم الرجال
            const authBtn = document.getElementById('auth-btn');
            authBtn.innerText = user.name;
            authBtn.href = "#"; // عشان ما يرجع لصفحة اللوجن
            
            // إضافة خيار تسجيل خروج عند الضغط على الاسم
            authBtn.onclick = function() {
                if(confirm("Logout?")) {
                    localStorage.removeItem('minecore_user');
                    location.reload();
                }
            };
        }
    </script>
</body>
</html>
