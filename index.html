<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MineClub - Home</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Press+Start+2P&display=swap');
        body { margin: 0; background: #0b0f19; color: white; font-family: 'Roboto', sans-serif; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: rgba(30, 41, 59, 0.2); border: 1px solid rgba(82, 255, 82, 0.2); border-radius: 50px; margin: 20px auto; width: 90%; backdrop-filter: blur(10px); }
        .brand-area { display: flex; align-items: center; gap: 10px; }
        #user-pic { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #52FF52; display: none; object-fit: cover; }
        .brand-name { font-family: 'Press Start 2P', cursive; color: #52FF52; font-size: 14px; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 13px; }
        #auth-link { color: #52FF52; font-weight: bold; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand-area">
            <img id="user-pic" src="" alt="Profile">
            <a href="index.html" class="brand-name">MINECLUB</a>
        </div>
        <div class="nav-links">
            <a href="/resoursepacks.html">Packs</a>
            <a href="/mods.html">Mods</a>
            <a href="https://discord.gg/rcdSNZEhBF">Discord</a>
            <div id="auth-box">
                <a href="login.html" id="auth-link">LOGIN</a>
            </div>
        </div>
    </nav>

    <script>
        const loggedUser = JSON.parse(localStorage.getItem('minecore_user'));
        if (loggedUser) {
            // إظهار صورة الرجال على الشمال بدل اللوجو القديم
            const userPic = document.getElementById('user-pic');
            userPic.src = loggedUser.avatar;
            userPic.style.display = "block";

            // إظهار اسمه على اليمين بدل كلمة LOGIN
            const authLink = document.getElementById('auth-link');
            authLink.innerText = loggedUser.name;
            authLink.href = "#"; 
            authLink.onclick = function() {
                if(confirm("Logout?")) { localStorage.clear(); location.reload(); }
            };
        }
    </script>
</body>
</html>
