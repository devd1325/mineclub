<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MineClub | Sign Up</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Press+Start+2P&display=swap');
        
        body { 
            margin: 0; 
            background-color: #0b0f19;
            /* نقشة الخطوط المخفية اللي طلبتها */
            background-image: 
                linear-gradient(rgba(82, 255, 82, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(82, 255, 82, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            height: 100vh; display: flex; justify-content: center; align-items: center; 
            font-family: 'Roboto', sans-serif; color: white; 
        }

        .box { 
            background: rgba(15, 23, 42, 0.9);
            padding: 30px; border-radius: 20px; 
            border: 1px solid rgba(82, 255, 82, 0.3);
            width: 380px; text-align: center; 
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .title { font-family: 'Press Start 2P', cursive; color: #52FF52; font-size: 14px; margin-bottom: 25px; }
        
        label { display: block; text-align: left; font-size: 10px; color: #52FF52; margin: 0 0 5px 5px; }

        input { 
            width: 100%; padding: 12px; margin-bottom: 12px; 
            background: #000; border: 1px solid #334155; 
            color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; 
        }

        /* تنسيق خانة التاريخ لتظهر بشكل إنجليزي ومرتب */
        input[type="date"] {
            text-transform: uppercase;
            font-family: 'Roboto', sans-serif;
            color-scheme: dark;
        }

        .btn { 
            width: 100%; background: #52FF52; color: #000; 
            border: none; padding: 14px; border-radius: 8px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; 
        }
        
        #status { margin-top: 15px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 class="title">CREATE ACCOUNT</h2>
        <form id="signupForm">
            <input type="text" id="fname" placeholder="Full Name" required>
            
            <label>BIRTH DATE (YYYY-MM-DD):</label>
            <input type="date" id="dob" required>
            
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" class="btn">Send Code</button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        // 1. حماية فورية: منع اختيار تاريخ في المستقبل (يمنع سنة 6000)
        const dobInput = document.getElementById('dob');
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const maxDate = `${year}-${month}-${day}`;
        
        dobInput.setAttribute('max', maxDate); // يمنع اختيار أي يوم بعد اليوم
        dobInput.setAttribute('min', '1950-01-01'); // يمنع اختيار تواريخ قديمة جداً

        emailjs.init("gWPVwp_AdEm3E6skj");
        let generatedCode = "";

        document.getElementById('signupForm').onsubmit = function(e) {
            e.preventDefault();
            
 
            const selectedDate = new Date(dobInput.value);
            if (selectedDate.getFullYear() > year) {
                alert("Are you from the future? Please enter a valid year!");
                return;
            }

            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            // كود إرسال الإيميل (EmailJS)
            emailjs.send("service_ecugym9", "template_tx3zt38", {
                email: document.getElementById('email').value,
                passcode: generatedCode
            }).then(() => {
                alert("Code Sent! Please check your email.");
                // هنا تفتح سكشن الـ Verify
            });
        };
    </script>
</body>
</html>
