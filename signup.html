<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MineCore - Sign Up</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Press+Start+2P&display=swap');
        body { margin: 0; background: #0b0f19; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Roboto', sans-serif; color: white; }
        .box { background: rgba(30, 41, 59, 0.4); padding: 30px; border-radius: 20px; border: 1px solid #52FF52; width: 380px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(82, 255, 82, 0.1); }
        .title { font-family: 'Press Start 2P', cursive; color: #52FF52; font-size: 16px; margin-bottom: 25px; }
        
        label { display: block; text-align: left; font-size: 10px; color: #52FF52; margin-bottom: 5px; margin-left: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid #334155; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; }
        input[type="date"] { color-scheme: dark; cursor: pointer; } /* لتحسين شكل التقويم */
        
        .btn { width: 100%; background: #52FF52; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        #verifySection { display: none; margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; }
        #status { margin-top: 15px; font-size: 12px; color: #52FF52; }
    </style>
</head>
<body>
    <div class="box">
        <h2 class="title">SIGN UP</h2>
        <form id="signupForm">
            <input type="text" id="fname" placeholder="Full Name" required>
            
            <label>DATE OF BIRTH:</label>
            <input type="date" id="dob" required>
            
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" class="btn">Register & Send Code</button>
        </form>

        <div id="verifySection">
            <input type="text" id="vCode" placeholder="Enter 6-digit code" maxlength="6">
            <button id="verifyBtn" class="btn" style="background: #fff;">Confirm & Save</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
        emailjs.init("gWPVwp_AdEm3E6skj"); 
        let generatedCode = "";

        // الـ 4 صور العشوائية اللي طلبتها
        const randomAvatars = [
            "https://i.ibb.co/Xz9S0m4/av1.png",
            "https://i.ibb.co/M9fK5z1/av2.png",
            "https://i.ibb.co/PZ0v3Y9/av3.png",
            "https://i.ibb.co/vD7H8Gz/av4.png"
        ];

        // دالة لحساب العمر من تاريخ الميلاد
        function calculateAge(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                age--;
            }
            return age;
        }

        document.getElementById('signupForm').onsubmit = function(e) {
            e.preventDefault();
            const status = document.getElementById('status');
            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            status.innerText = "Sending code in your eamil...";

            emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
                email: document.getElementById('email').value,
                passcode: generatedCode
            }).then(() => {
                document.getElementById('signupForm').style.display = "none";
                document.getElementById('verifySection').style.display = "block";
                status.innerText = "Check your email!";
            });
        };

        document.getElementById('verifyBtn').onclick = async function() {
            const inputCode = document.getElementById('vCode').value;
            if (inputCode === generatedCode) {
                const chosenAvatar = randomAvatars[Math.floor(Math.random() * randomAvatars.length)];
                const birthDate = document.getElementById('dob').value;

                const userData = {
                    name: document.getElementById('fname').value,
                    dob: birthDate,               // تاريخ الميلاد
                    age: calculateAge(birthDate),  // العمر المحسوب تلقائياً
                    avatar: chosenAvatar,          // صورة عشوائية
                    email: document.getElementById('email').value,
                    password: document.getElementById('pass').value,
                    joined_at: new Date().toLocaleString()
                };

                await fetch("https://minecore2026-default-rtdb.firebaseio.com/accounts.json", {
                    method: 'POST', body: JSON.stringify(userData)
                });

                alert("Welcome to MINE CORE!");
                window.location.href = "login.html";
            } else {
                alert("Wrong Code!");
            }
        };
    </script>
</body>
</html>
