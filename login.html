<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MineCore - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box {
            background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 20px;
            border: 1px solid #52FF52; width: 350px; text-align: center;
            backdrop-filter: blur(10px);
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0; background: #000;
            border: 1px solid #334155; color: #fff; border-radius: 5px; box-sizing: border-box;
        }
    </style>
</head>
<div class="login-box">
    <h2 class="section-title">LOGIN</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Email or Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="mc-button" style="width:100%; cursor:pointer;">SIGN UP / LOGIN</button>
    </form>
    <div id="msg" style="margin-top:10px; font-size:12px; color:#52FF52;"></div>
    <a href="index.html" style="display:block; margin-top:20px; color:#94a3b8; text-decoration:none;">Back to Home</a>
</div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // إرسال البيانات للخادم لحفظها
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.text();
            document.getElementById('msg').innerText = result;
        };
    </script>
</body>
</html>
